<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bravo Secure — Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: { primary: "#2563EB", "background-dark": "#0A0F1E" },
        fontFamily: { display: ["Manrope", "sans-serif"] },
      },
    },
  }
</script>
<style>
  body { font-family: 'Manrope', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  main { scrollbar-width: none; }
  main::-webkit-scrollbar { display: none; }

  .path-card {
    display: flex; align-items: center; gap: 14px;
    background: #0D1929;
    border: 1.5px solid #1E2D45;
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    width: 100%;
    text-align: left;
  }
  .path-card:active {
    transform: scale(0.98);
  }
  .path-card.active,
  .path-card:hover {
    border-color: #2563EB;
    background: rgba(37,99,235,0.08);
    box-shadow: 0 0 0 1px rgba(37,99,235,0.2);
  }
  .path-card.vb-active,
  .path-card.vb:hover {
    border-color: #7C3AED;
    background: rgba(124,58,237,0.08);
    box-shadow: 0 0 0 1px rgba(124,58,237,0.2);
  }

  .icon-wrap {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-blue  { background: rgba(37,99,235,0.18); color: #60A5FA; }
  .icon-purple{ background: rgba(124,58,237,0.18); color: #A78BFA; }

  .ai-badge {
    font-size: 9px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, #7C3AED, #4F46E5);
    color: #fff; border-radius: 6px; padding: 2px 6px;
    text-transform: uppercase;
  }
</style>
</head>
<body class="bg-[#0A0F1E] font-display text-slate-100 h-screen flex flex-col">

  <!-- Header logo -->
  <header class="flex items-center px-5 pt-10 pb-4 shrink-0">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-[9px] flex items-center justify-center" style="background:#0D1929;border:1.5px solid rgba(37,99,235,0.4)">
        <svg width="18" height="18" viewBox="0 0 80 80" fill="none">
          <path d="M40 5L10 18.3333V38.3333C10 57.1333 22.8 74.4667 40 78.3333C57.2 74.4667 70 57.1333 70 38.3333V18.3333L40 5Z"
            fill="rgba(37,99,235,0.15)" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M29 41L37 49L51 33" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="text-xs font-extrabold tracking-[2.5px] uppercase text-slate-300">Bravo Secure</span>
    </div>
  </header>

  <!-- Scrollable main -->
  <main class="flex-1 px-5 pb-6 overflow-y-auto flex flex-col">

    <!-- Title -->
    <div class="mb-6 mt-2">
      <h1 class="text-[26px] font-extrabold leading-tight tracking-tight text-slate-100">Welcome to Bravo</h1>
      <p class="text-slate-400 text-[13px] mt-1 leading-snug">Choose how you'd like to get started</p>
    </div>

    <!-- Path cards -->
    <div class="flex flex-col gap-3">

      <!-- Messenger -->
      <button class="path-card" onclick="selectPath('messenger', this)" data-path="messenger">
        <div class="icon-wrap icon-blue">
          <span class="material-symbols-outlined text-[22px]">chat_bubble</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[13px] font-bold text-slate-100 mb-0.5 uppercase tracking-wide">Messenger</p>
          <p class="text-[11px] text-slate-400 leading-snug">Secure encrypted communications, team chats, calls &amp; news</p>
        </div>
        <span class="material-symbols-outlined text-slate-600 text-[18px] shrink-0">chevron_right</span>
      </button>

      <!-- Bravo Secure Services -->
      <button class="path-card" onclick="selectPath('services', this)" data-path="services">
        <div class="icon-wrap icon-blue">
          <span class="material-symbols-outlined text-[22px]">shield</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[13px] font-bold text-slate-100 mb-0.5 uppercase tracking-wide">Bravo Secure Services</p>
          <p class="text-[11px] text-slate-400 leading-snug">On-demand security, transfers &amp; executive protection</p>
        </div>
        <span class="material-symbols-outlined text-slate-600 text-[18px] shrink-0">chevron_right</span>
      </button>

      <!-- Virtual Bodyguard -->
      <button class="path-card vb" onclick="selectPath('vb', this)" data-path="vb">
        <div class="icon-wrap icon-purple">
          <span class="material-symbols-outlined text-[22px]">robot_2</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-0.5">
            <p class="text-[13px] font-bold text-slate-100 uppercase tracking-wide">Virtual Bodyguard</p>
            <span class="ai-badge">AI</span>
          </div>
          <p class="text-[11px] text-slate-400 leading-snug">AI-powered personal safety monitoring &amp; risk intelligence</p>
        </div>
        <span class="material-symbols-outlined text-slate-600 text-[18px] shrink-0">chevron_right</span>
      </button>

    </div>

  </main>

  <!-- Footer -->
  <footer class="shrink-0 pb-10 pt-3 flex items-center justify-center gap-1.5">
    <span class="text-slate-500 text-[13px]">Already have an account?</span>
    <button onclick="goToLogin()" class="text-primary text-[13px] font-bold hover:text-blue-400 transition-colors">Sign In</button>
  </footer>

<script>
  let selectedPath = null;

  function selectPath(path, el) {
    selectedPath = path;
    // Store in session
    sessionStorage.setItem('authPath', path);
    sessionStorage.setItem('authFlow', 'register');

    // Navigate immediately to register
    if (window.parent && window.parent.loadScreen) {
      window.parent.loadScreen('screens/register.html', document.createElement('div'));
    }
  }

  function goToLogin() {
    if (window.parent && window.parent.loadScreen) {
      window.parent.loadScreen('screens/login.html', document.createElement('div'));
    }
  }
</script>
</body></html>
