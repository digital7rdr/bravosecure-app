<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bravo Messenger — Voice Call</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{
      colors:{ primary:"#2563EB" },
      fontFamily:{ display:["Manrope","sans-serif"] },
    }}
  }
</script>
<style>
  *, *::before, *::after { scrollbar-width:none; -ms-overflow-style:none; }
  *::-webkit-scrollbar { display:none; }
  html, body { height:100%; overflow:hidden; font-family:'Manrope',sans-serif; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .filled { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

  @keyframes pulse-ring {
    0%   { transform:scale(1); opacity:0.5; }
    100% { transform:scale(1.8); opacity:0; }
  }
  .pulse-ring  { animation:pulse-ring 2.4s ease-out infinite; }
  .pulse-ring2 { animation:pulse-ring 2.4s ease-out 0.9s infinite; }

  @keyframes bar {
    0%,100% { transform:scaleY(0.2); }
    50%     { transform:scaleY(1); }
  }
  .bar { transform-origin:bottom; animation:bar 1.1s ease-in-out infinite; }
  .bar:nth-child(1){animation-delay:0.00s;} .bar:nth-child(2){animation-delay:0.10s;}
  .bar:nth-child(3){animation-delay:0.20s;} .bar:nth-child(4){animation-delay:0.30s;}
  .bar:nth-child(5){animation-delay:0.15s;} .bar:nth-child(6){animation-delay:0.05s;}
  .bar:nth-child(7){animation-delay:0.20s;} .bar:nth-child(8){animation-delay:0.30s;}
  .bar:nth-child(9){animation-delay:0.20s;} .bar:nth-child(10){animation-delay:0.10s;}
  .bar:nth-child(11){animation-delay:0.00s;}

  .ctrl-btn { display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; }
  .ctrl-circle {
    width:50px; height:50px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:#171c2e; border:1px solid rgba(255,255,255,0.09);
    transition:background 0.15s, transform 0.1s;
  }
  .ctrl-circle:active  { transform:scale(0.92); }
  .ctrl-circle:hover   { background:#1d2238; }
  .ctrl-circle.active  { background:rgba(37,99,235,0.25); border-color:rgba(37,99,235,0.5); }
  .ctrl-label {
    font-size:10px; font-weight:800; letter-spacing:1.4px;
    text-transform:uppercase; color:#4b5563;
  }
</style>
</head>
<body class="text-slate-100 h-screen flex flex-col"
  style="background:radial-gradient(ellipse at 50% 5%, rgba(109,40,217,0.2) 0%, #090D1A 55%);">

<!-- Top row (safe area) -->
<div class="shrink-0 flex items-center justify-between px-4 pt-10 pb-3">
  <button onclick="nav('messenger-home.html')"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded-full"
    style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);">
    <span class="material-symbols-outlined text-slate-300" style="font-size:14px;">call_missed</span>
    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Minimise</span>
  </button>

  <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full"
    style="background:rgba(153,27,27,0.2); border:1px solid rgba(239,68,68,0.28);">
    <span class="material-symbols-outlined filled text-red-400" style="font-size:12px;">videocam_off</span>
    <div class="leading-none">
      <div class="text-[8.5px] font-extrabold uppercase tracking-widest text-red-400">AES-256</div>
      <div class="text-[8.5px] font-extrabold uppercase tracking-widest text-red-400">Encrypted</div>
    </div>
  </div>
</div>

<!-- Avatar -->
<div class="flex flex-col items-center shrink-0 pt-4">
  <div class="relative flex items-center justify-center mb-5">
    <div class="absolute rounded-full pulse-ring"
      style="width:110px;height:110px;border:1.5px solid rgba(124,58,237,0.35);"></div>
    <div class="absolute rounded-full pulse-ring2"
      style="width:110px;height:110px;border:1.5px solid rgba(124,58,237,0.15);"></div>
    <div class="relative z-10 rounded-full overflow-hidden"
      style="width:88px;height:88px;
             box-shadow:0 0 0 3px rgba(109,40,217,0.35), 0 8px 36px rgba(109,40,217,0.45);">
      <img src="https://i.pravatar.cc/176?img=3" alt="Marcus Thornton"
           style="width:100%;height:100%;object-fit:cover;display:block;"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
      <div style="display:none;width:100%;height:100%;background:linear-gradient(145deg,#7C3AED,#4F46E5);align-items:center;justify-content:center;">
        <span class="material-symbols-outlined filled text-white" style="font-size:42px;">person</span>
      </div>
    </div>
  </div>

  <!-- Name -->
  <h1 class="text-center font-extrabold uppercase text-white mb-3"
    style="font-size:28px; letter-spacing:3.5px; line-height:1.18;">
    Marcus<br>Thornton
  </h1>

  <!-- Status -->
  <div class="flex items-center gap-2 mb-1">
    <span class="inline-block rounded-full" style="width:8px;height:8px;background:#22c55e;box-shadow:0 0 7px #22c55e;"></span>
    <span class="text-[11px] font-extrabold uppercase tracking-[2px]" style="color:#22c55e;">Connected · 02:34</span>
  </div>

  <!-- Subtitle -->
  <p class="text-[9.5px] font-semibold uppercase tracking-[2px] text-slate-600">
    Encrypted Voice Call · WebRTC
  </p>
</div>

<!-- Waveform -->
<div class="flex-1 flex items-center justify-center">
  <div class="flex gap-[5px] items-end" style="height:44px; opacity:0.6;">
    <div class="bar w-[3px] rounded-full" style="height:16px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:26px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:36px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:28px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:44px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:32px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:44px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:28px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:36px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:24px;background:#7C3AED;"></div>
    <div class="bar w-[3px] rounded-full" style="height:16px;background:#7C3AED;"></div>
  </div>
</div>

<!-- Controls -->
<div class="shrink-0 px-5 pb-6">

  <div class="flex justify-between items-center mb-7 px-2">
    <button class="ctrl-btn" onclick="toggleCtrl('mute','mic','mic_off')">
      <div class="ctrl-circle" id="circle-mute">
        <span class="material-symbols-outlined text-slate-200" id="ico-mute" style="font-size:20px;">mic</span>
      </div>
      <span class="ctrl-label">Mute</span>
    </button>

    <button class="ctrl-btn" onclick="toggleCtrl('speaker','volume_up','volume_off')">
      <div class="ctrl-circle" id="circle-speaker">
        <span class="material-symbols-outlined text-slate-200" id="ico-speaker" style="font-size:20px;">volume_up</span>
      </div>
      <span class="ctrl-label">Speaker</span>
    </button>

    <button class="ctrl-btn" onclick="toggleCtrl('hold','pause_circle','play_circle')">
      <div class="ctrl-circle" id="circle-hold">
        <span class="material-symbols-outlined text-slate-200" id="ico-hold" style="font-size:20px;">pause_circle</span>
      </div>
      <span class="ctrl-label">Hold</span>
    </button>

    <button class="ctrl-btn" onclick="toggleCtrl('keypad','dialpad','dialpad')">
      <div class="ctrl-circle" id="circle-keypad">
        <span class="material-symbols-outlined text-slate-200" id="ico-keypad" style="font-size:20px;">dialpad</span>
      </div>
      <span class="ctrl-label">Keypad</span>
    </button>
  </div>

  <!-- End call -->
  <div class="flex justify-center">
    <button onclick="nav('messenger-home.html')"
      class="flex items-center justify-center rounded-full transition-transform active:scale-95"
      style="width:60px;height:60px;
             background:linear-gradient(145deg,#ef4444,#b91c1c);
             box-shadow:0 6px 28px rgba(239,68,68,0.5);">
      <span class="material-symbols-outlined filled text-white" style="font-size:28px;">call_end</span>
    </button>
  </div>

</div>

<!-- Home indicator -->
<div class="shrink-0 flex justify-center pb-2">
  <div class="rounded-full" style="width:110px;height:4px;background:rgba(255,255,255,0.15);"></div>
</div>

<script>
  function nav(screen) {
    if (!window.parent || !window.parent.loadScreen) return;
    window.parent.loadScreen('screens/' + screen, document.createElement('div'));
  }
  function toggleCtrl(key, iconOn, iconOff) {
    const circle = document.getElementById('circle-' + key);
    const icon   = document.getElementById('ico-' + key);
    const isActive = circle.classList.toggle('active');
    if (icon) icon.textContent = isActive ? iconOff : iconOn;
  }
</script>
</body></html>
